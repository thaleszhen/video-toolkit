<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Radar - 需求挖掘平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-white mb-2">🔍 Demand Radar</h1>
                    <p class="text-gray-400">从社交媒体挖掘用户需求，发现变现机会</p>
                </div>
                <div class="flex gap-4">
                    <select id="platformFilter" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
                        <option value="all">所有平台</option>
                        <option value="hn">Hacker News</option>
                        <option value="reddit">Reddit</option>
                    </select>
                    <select id="categoryFilter" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm">
                        <option value="all">所有分类</option>
                        <option value="tool">工具</option>
                        <option value="question">问答</option>
                        <option value="showcase">展示</option>
                    </select>
                    <button id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-medium">
                        刷新
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-2xl font-bold text-blue-400" id="totalDemands">0</div>
                <div class="text-sm text-gray-400">总需求</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-2xl font-bold text-green-400" id="highScoreDemands">0</div>
                <div class="text-sm text-gray-400">高评分需求</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-2xl font-bold text-purple-400" id="todayNew">0</div>
                <div class="text-sm text-gray-400">今日新增</div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4">
                <div class="text-2xl font-bold text-orange-400" id="avgScore">0.0</div>
                <div class="text-sm text-gray-400">平均评分</div>
            </div>
        </div>

        <!-- Demands List -->
        <div class="space-y-4" id="demandsList">
            <!-- Demands will be loaded here -->
            <div class="text-center py-12 text-gray-500">
                <div class="text-4xl mb-4">📊</div>
                <p>正在加载数据...</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>Demand Radar v0.1.0 | MVP Demo</p>
            <p class="mt-2">数据来源: Hacker News (模拟数据)</p>
        </footer>
    </div>

    <script>
        // Mock data - 将来从API获取
        const mockDemands = [
            {
                id: 1,
                title: "Ask HN: Why can't we just make more RAM?",
                description: "I've been wondering about this for a while. With all the advances in manufacturing, why is RAM still so expensive and limited?",
                category: "question",
                platform: "hn",
                score: 0.49,
                engagement_score: 0.45,
                confidence: 0.90,
                pain_points: ["why", "expensive", "limited"],
                tech_keywords: ["ram", "manufacturing"],
                author: "curious_dev",
                source_url: "https://news.ycombinator.com/item?id=12345",
                published_at: "2024-01-15T10:30:00Z"
            },
            {
                id: 2,
                title: "Show HN: Free email finder for job seekers",
                description: "Built a tool to find and contact recruiters directly. No signup required, completely free.",
                category: "tool",
                platform: "hn",
                score: 0.09,
                engagement_score: 0.08,
                confidence: 0.85,
                pain_points: ["find", "contact"],
                tech_keywords: ["tool", "email", "recruiters"],
                author: "jobseeker2024",
                source_url: "https://news.ycombinator.com/item?id=12346",
                published_at: "2024-01-15T09:15:00Z"
            },
            {
                id: 3,
                title: "Revenue can hide unprofitable freelance clients",
                description: "My story of dropping high-revenue clients who were actually losing me money due to scope creep and time investment.",
                category: "showcase",
                platform: "hn",
                score: 0.06,
                engagement_score: 0.05,
                confidence: 0.70,
                pain_points: ["losing", "scope creep", "time"],
                tech_keywords: ["freelance", "clients"],
                author: "freelancer_pro",
                source_url: "https://news.ycombinator.com/item?id=12347",
                published_at: "2024-01-15T08:00:00Z"
            },
            {
                id: 4,
                title: "I need a tool to automatically organize my emails by sender",
                description: "Every day I receive hundreds of emails and it takes me 2 hours to sort them. I'm willing to pay for a solution that can learn my preferences.",
                category: "tool",
                platform: "hn",
                score: 0.35,
                engagement_score: 0.20,
                confidence: 0.88,
                pain_points: ["need", "takes time", "hundreds of emails"],
                purchase_signals: ["willing to pay"],
                tech_keywords: ["tool", "automatically", "organize", "emails"],
                author: "busy_manager",
                source_url: "https://news.ycombinator.com/item?id=12348",
                published_at: "2024-01-15T07:30:00Z"
            },
            {
                id: 5,
                title: "Looking for a SaaS alternative to Excel for financial modeling",
                description: "Our team is growing and Excel is becoming a bottleneck. Need something web-based with real-time collaboration. Budget: $500/month.",
                category: "tool",
                platform: "hn",
                score: 0.42,
                engagement_score: 0.25,
                confidence: 0.92,
                pain_points: ["bottleneck", "growing"],
                purchase_signals: ["budget", "looking for"],
                tech_keywords: ["saas", "excel", "web-based", "financial modeling"],
                author: "startup_cfo",
                source_url: "https://news.ycombinator.com/item?id=12349",
                published_at: "2024-01-15T06:45:00Z"
            }
        ];

        // 渲染需求卡片
        function renderDemands(demands) {
            const container = document.getElementById('demandsList');
            container.innerHTML = '';

            if (demands.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <div class="text-4xl mb-4">🔍</div>
                        <p>没有找到匹配的需求</p>
                    </div>
                `;
                return;
            }

            demands.forEach(demand => {
                const scoreColor = demand.score >= 0.3 ? 'text-green-400' :
                                   demand.score >= 0.1 ? 'text-yellow-400' : 'text-gray-400';

                const card = document.createElement('div');
                card.className = 'bg-gray-800 rounded-lg p-6 hover:bg-gray-750 transition';
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <span class="bg-blue-600 text-xs px-2 py-1 rounded">${demand.platform.toUpperCase()}</span>
                            <span class="bg-gray-700 text-xs px-2 py-1 rounded">${demand.category}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-sm ${scoreColor} font-medium">评分: ${demand.score.toFixed(2)}</span>
                            <span class="text-sm text-gray-500">置信度: ${demand.confidence.toFixed(2)}</span>
                        </div>
                    </div>
                    <h3 class="text-lg font-semibold text-white mb-2">${demand.title}</h3>
                    <p class="text-gray-400 text-sm mb-3">${demand.description}</p>
                    <div class="flex flex-wrap gap-2 mb-3">
                        ${demand.pain_points.map(p => `<span class="bg-red-900/30 text-red-400 text-xs px-2 py-1 rounded">痛点: ${p}</span>`).join('')}
                        ${demand.tech_keywords.map(k => `<span class="bg-blue-900/30 text-blue-400 text-xs px-2 py-1 rounded">${k}</span>`).join('')}
                        ${demand.purchase_signals ? demand.purchase_signals.map(s => `<span class="bg-green-900/30 text-green-400 text-xs px-2 py-1 rounded">付费: ${s}</span>`).join('') : ''}
                    </div>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <span>@${demand.author}</span>
                        <a href="${demand.source_url}" target="_blank" class="text-blue-400 hover:underline">查看原文 →</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 更新统计
        function updateStats(demands) {
            const total = demands.length;
            const highScore = demands.filter(d => d.score >= 0.3).length;
            const avgScore = total > 0 ? demands.reduce((sum, d) => sum + d.score, 0) / total : 0;

            document.getElementById('totalDemands').textContent = total;
            document.getElementById('highScoreDemands').textContent = highScore;
            document.getElementById('todayNew').textContent = Math.floor(total * 0.2);
            document.getElementById('avgScore').textContent = avgScore.toFixed(2);
        }

        // 过滤需求
        function filterDemands() {
            const platform = document.getElementById('platformFilter').value;
            const category = document.getElementById('categoryFilter').value;

            let filtered = [...mockDemands];

            if (platform !== 'all') {
                filtered = filtered.filter(d => d.platform === platform);
            }

            if (category !== 'all') {
                filtered = filtered.filter(d => d.category === category);
            }

            renderDemands(filtered);
            updateStats(filtered);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderDemands(mockDemands);
            updateStats(mockDemands);

            // 事件监听
            document.getElementById('platformFilter').addEventListener('change', filterDemands);
            document.getElementById('categoryFilter').addEventListener('change', filterDemands);
            document.getElementById('refreshBtn').addEventListener('click', () => {
                // 模拟刷新效果
                const container = document.getElementById('demandsList');
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <div class="text-4xl mb-4">⏳</div>
                        <p>正在刷新数据...</p>
                    </div>
                `;
                setTimeout(() => {
                    filterDemands();
                }, 500);
            });
        });
    </script>
</body>
</html>
